<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ken's Job Tracker 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f0efea;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --green-dark: #0F6E56;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #2c2c2a;
        --surface2: #222220;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
        --text: #f1efe8;
        --text2: #b4b2a9;
        --text3: #888780;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
    .title { font-size: 22px; font-weight: 600; color: var(--text); }
    .subtitle { font-size: 13px; color: var(--text3); margin-top: 3px; }

    .add-btn {
      background: var(--green);
      border: none;
      border-radius: var(--radius-md);
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
    }
    .add-btn:hover { background: var(--green-dark); }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 12px; color: var(--text3); margin-top: 3px; }

    .form-card { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
    .form-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
    .form-group textarea { height: 70px; }
    .form-actions { display: flex; gap: 8px; margin-top: 1rem; }
    .btn-save { background: var(--green); border: none; border-radius: var(--radius-md); padding: 9px 22px; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: var(--green-dark); }
    .btn-cancel { background: transparent; border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 9px 16px; font-size: 14px; color: var(--text2); cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: var(--surface2); }

    .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text2);
      font-family: inherit;
    }
    .filter-btn:hover { background: var(--surface); }
    .filter-btn.active { background: #E6F1FB; color: #185FA5; border-color: transparent; }

    .jobs-list { display: flex; flex-direction: column; gap: 10px; }

    .job-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .job-card:hover { border-color: var(--border-strong); }
    .job-company { font-size: 15px; font-weight: 600; color: var(--text); }
    .job-role { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .job-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
    .badge-applied   { background: #E6F1FB; color: #185FA5; }
    .badge-interview { background: #FAEEDA; color: #854F0B; }
    .badge-offer     { background: #EAF3DE; color: #3B6D11; }
    .badge-rejected  { background: #FCEBEB; color: #A32D2D; }
    .badge-waiting   { background: #EEEDFE; color: #534AB7; }
    .job-date { font-size: 11px; color: var(--text3); }
    .job-note { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.55; border-top: 0.5px solid var(--border); padding-top: 8px; }
    .job-actions { display: flex; gap: 4px; }
    .icon-btn { background: transparent; border: none; cursor: pointer; padding: 5px; border-radius: 6px; color: var(--text3); font-size: 15px; line-height: 1; }
    .icon-btn:hover { background: var(--surface2); }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="title">Ken's Job Tracker</div>
      <div class="subtitle">Keep track of every application</div>
    </div>
    <button class="add-btn" onclick="toggleForm()">+ Add Job</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="form-card" id="form-card">
    <div class="form-title" id="form-title">New job application</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Company name *</label>
        <input type="text" id="f-company" placeholder="e.g. Best Buy" />
      </div>
      <div class="form-group">
        <label>Job title *</label>
        <input type="text" id="f-role" placeholder="e.g. Sales Advisor" />
      </div>
      <div class="form-group">
        <label>Date applied</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="applied">Applied</option>
          <option value="waiting">Waiting to hear back</option>
          <option value="interview">Interview scheduled</option>
          <option value="offer">Got an offer!</option>
          <option value="rejected">Not selected</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notes (optional)</label>
        <textarea id="f-notes" placeholder="Contact name, next steps, anything helpful..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveJob()">Save</button>
      <button class="btn-cancel" onclick="cancelForm()">Cancel</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="jobs-list" id="jobs-list"></div>

</div>

<script>
  const STORAGE_KEY = 'ken_jobs_2026';
  let jobs = [];
  let filter = 'all';
  let editId = null;

  const statusConfig = {
    applied:   { label: 'Applied',              cls: 'badge-applied' },
    waiting:   { label: 'Waiting to hear back', cls: 'badge-waiting' },
    interview: { label: 'Interview scheduled',  cls: 'badge-interview' },
    offer:     { label: 'Got an offer!',        cls: 'badge-offer' },
    rejected:  { label: 'Not selected',         cls: 'badge-rejected' }
  };

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) jobs = JSON.parse(raw);
    } catch(e) { jobs = []; }
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs)); } catch(e) {}
  }

  function toggleForm() {
    editId = null;
    document.getElementById('form-title').textContent = 'New job application';
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-status').value = 'applied';
    document.getElementById('f-notes').value = '';
    document.getElementById('form-card').style.display = 'block';
    document.getElementById('f-company').focus();
  }

  function cancelForm() {
    document.getElementById('form-card').style.display = 'none';
    editId = null;
  }

  function saveJob() {
    const company = document.getElementById('f-company').value.trim();
    const role = document.getElementById('f-role').value.trim();
    if (!company || !role) { alert('Please add a company name and job title.'); return; }
    const job = {
      id: editId || Date.now().toString(),
      company, role,
      date: document.getElementById('f-date').value,
      status: document.getElementById('f-status').value,
      notes: document.getElementById('f-notes').value.trim()
    };
    if (editId) {
      jobs = jobs.map(j => j.id === editId ? job : j);
    } else {
      jobs.unshift(job);
    }
    save();
    cancelForm();
    render();
  }

  function editJob(id) {
    const j = jobs.find(j => j.id === id);
    if (!j) return;
    editId = id;
    document.getElementById('form-title').textContent = 'Edit application';
    document.getElementById('f-company').value = j.company;
    document.getElementById('f-role').value = j.role;
    document.getElementById('f-date').value = j.date;
    document.getElementById('f-status').value = j.status;
    document.getElementById('f-notes').value = j.notes;
    document.getElementById('form-card').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteJob(id) {
    if (!confirm('Remove this application?')) return;
    jobs = jobs.filter(j => j.id !== id);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    render();
  }

  function fmtDate(d) {
    if (!d) return '';
    const parts = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
  }

  function render() {
    const counts = { all: jobs.length };
    Object.keys(statusConfig).forEach(k => counts[k] = jobs.filter(j => j.status === k).length);

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-num">${counts.all}</div><div class="stat-label">Total applied</div></div>
      <div class="stat"><div class="stat-num">${counts.interview}</div><div class="stat-label">Interviews</div></div>
      <div class="stat"><div class="stat-num">${counts.offer}</div><div class="stat-label">Offers</div></div>
      <div class="stat"><div class="stat-num">${counts.waiting}</div><div class="stat-label">Waiting</div></div>
    `;

    const filterLabels = { all: 'All', applied: 'Applied', waiting: 'Waiting', interview: 'Interview', offer: 'Offer', rejected: 'Not selected' };
    document.getElementById('filters').innerHTML = Object.entries(filterLabels).map(([k, v]) =>
      `<button class="filter-btn${filter === k ? ' active' : ''}" onclick="setFilter('${k}')">${v}${k !== 'all' && counts[k] ? ' (' + counts[k] + ')' : ''}</button>`
    ).join('');

    const visible = filter === 'all' ? jobs : jobs.filter(j => j.status === filter);
    const list = document.getElementById('jobs-list');

    if (!visible.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>${jobs.length ? 'No jobs with this status yet.' : 'No applications yet — add your first one!'}</div>`;
      return;
    }

    list.innerHTML = visible.map(j => {
      const sc = statusConfig[j.status] || statusConfig.applied;
      return `<div class="job-card">
        <div>
          <div class="job-company">${j.company}</div>
          <div class="job-role">${j.role}</div>
          <div class="job-meta">
            <span class="badge ${sc.cls}">${sc.label}</span>
            ${j.date ? `<span class="job-date">Applied ${fmtDate(j.date)}</span>` : ''}
          </div>
          ${j.notes ? `<div class="job-note">${j.notes}</div>` : ''}
        </div>
        <div class="job-actions">
          <button class="icon-btn" title="Edit" onclick="editJob('${j.id}')">✏️</button>
          <button class="icon-btn" title="Delete" onclick="deleteJob('${j.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }

  load();
</script>
</body>
</html>
